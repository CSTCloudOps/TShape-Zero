   <g id="text_1">
    <text style="fill: #17212b; font: 700 7.2px 'DejaVu Sans'; text-anchor: start" x="7.4592" y="13.547475" transform="rotate(-0 7.4592 13.547475)">From target training to a reusable detector</text>
   </g>
   <g id="text_2">
    <text style="fill: #667085; font: 4.8px 'DejaVu Sans'; text-anchor: start" x="7.4592" y="22.85805" transform="rotate(-0 7.4592 22.85805)">claim boundary  |  stress test  |  repair  |  deployment</text>
   </g>
   <g id="text_3">
    <text style="fill: #17212b; font: 700 5.6px 'DejaVu Sans'; text-anchor: start" x="10.91664" y="46.782645" transform="rotate(-0 10.91664 46.782645)">1  ORIGINAL CLAIM</text>
   </g>
   <g id="text_4">
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(10.91664 57.878778)">Target KPI + labels</text>
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(10.91664 63.141749)">per-series TShape training</text>
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(10.91664 68.404721)">strong EasyTSAD F1 / F1-E</text>
   </g>
   <g id="text_5">
    <text style="fill: #17212b; font: 700 5.6px 'DejaVu Sans'; text-anchor: start" x="134.39664" y="46.782645" transform="rotate(-0 134.39664 46.782645)">2  REUSE STRESS TEST</text>
   </g>
   <g id="text_6">
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(134.39664 57.878778)">One frozen model meets unseen KPI</text>
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(134.39664 63.141749)">shape, scale, and noise shift</text>
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(134.39664 68.404721)">normal / incident scores overlap</text>
   </g>
   <g id="text_7">
    <text style="fill: #17212b; font: 700 5.6px 'DejaVu Sans'; text-anchor: start" x="10.91664" y="129.020325" transform="rotate(-0 10.91664 129.020325)">3  ALGORITHMIC REPAIR</text>
   </g>
   <g id="text_8">
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(10.91664 140.116458)">Synthetic Pattern Bank -&gt; TShape</text>
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(10.91664 145.379429)">residual guard under shift</text>
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(10.91664 150.642401)">fixed open-box score fusion</text>
   </g>
   <g id="text_9">
    <text style="fill: #17212b; font: 700 5.6px 'DejaVu Sans'; text-anchor: start" x="134.39664" y="129.020325" transform="rotate(-0 134.39664 129.020325)">4  PRODUCT CONTRACT</text>
   </g>
   <g id="text_10">
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(134.39664 140.116458)">0.138-MiB checkpoint + scorer</text>
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(134.39664 145.379429)">834 series / 44 configurations</text>
    <text style="fill: #667085; font: 4.7px 'DejaVu Sans'" transform="translate(134.39664 150.642401)">CLI + web + channel attribution</text>
   </g>
